<!doctype html>
<html lang="ro">
  <head>
    <meta charset="UTF-8" />
    <title>Control Panel - Coco Cakes</title>
    <style>
      /* Un stil simplu doar pentru ecranul de login și structura de admin */
      body,
      html {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        font-family: Arial, sans-serif;
      }
      #login-container {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100vh;
        background: #f5f5f5;
      }
      .login-form {
        background: white;
        padding: 30px;
        border-radius: 8px;
        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
        display: flex;
        flex-direction: column;
        gap: 15px;
        width: 300px;
      }
      .login-form input,
      .login-form button {
        padding: 10px;
        border: 1px solid #ccc;
        border-radius: 4px;
      }
      .login-form button {
        background: #ff6b81;
        color: white;
        border: none;
        cursor: pointer;
        font-weight: bold;
      }

      /* Iframe-ul care va ocupa tot ecranul după logare */
      #site-frame {
        width: 100%;
        height: 100%;
        border: none;
        display: none;
      }
    </style>
  </head>
  <body>
    <div id="login-container">
      <form class="login-form" id="login-form">
        <h2>Admin Coco Cakes</h2>
        <input
          type="text"
          id="email"
          placeholder="Email"
          required
          value="admin@cococakes.ro"
        />
        <input type="password" id="password" placeholder="Parolă" required />
        <button type="submit">Autentificare</button>
        <p
          id="error-msg"
          style="color: red; display: none; font-size: 14px"
        ></p>
      </form>
    </div>

    <iframe id="site-frame" src="./front.html"></iframe>

    <script src="admin.js"></script>
  </body>
</html>
